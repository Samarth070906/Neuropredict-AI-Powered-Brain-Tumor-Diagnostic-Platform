<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neuropredict - Reset Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0D9488',    // Teal 600
                        secondary: '#0F172A',  // Slate 900
                        surface: '#F8FAFC',    // Slate 50
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        heading: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/c1df782baf.js" crossorigin="anonymous"></script>
</head>
<body class="font-sans antialiased bg-surface text-slate-800 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-white rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-100 p-8 sm:p-10 relative overflow-hidden">
        
        <!-- Abstract Decoration -->
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-teal-100 rounded-full mix-blend-multiply opacity-50 pointer-events-none"></div>

        <div class="text-center mb-8 relative z-10">
            <div class="w-16 h-16 bg-slate-50 border border-slate-200 rounded-2xl flex items-center justify-center mx-auto mb-6">
                <i class="fa-solid fa-lock-open text-2xl text-primary"></i>
            </div>
            <h1 class="font-heading text-2xl font-bold text-secondary mb-2">Forgot Password?</h1>
            <p class="text-slate-500 text-sm">No worries, we'll send you reset instructions.</p>
        </div>

        <form action="/" class="space-y-6 relative z-10">
            <div>
                <label for="email" class="block text-sm font-medium text-slate-700 mb-2">Registered Email Address</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fa-regular fa-envelope text-slate-400"></i>
                    </div>
                    <input type="email" id="email" name="email" required 
                        class="block w-full pl-10 px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-primary focus:border-primary transition-colors hover:bg-white outline-none" 
                        placeholder="doctor@hospital.com">
                </div>
            </div>

            <button type="button" onclick="window.location.href='/signin'" class="w-full bg-primary hover:bg-teal-700 text-white font-semibold py-3 px-4 rounded-xl transition-all shadow-lg shadow-teal-500/20 hover:shadow-teal-500/40 hover:-translate-y-0.5">
                Reset Password
            </button>
        </form>

        <div class="mt-8 text-center relative z-10">
            <a href="/signin" class="text-sm font-medium text-slate-500 hover:text-secondary transition-colors inline-flex items-center gap-2">
                <i class="fa-solid fa-arrow-left"></i> Back to login
            </a>
        </div>
    </div>

</body>
</html>
