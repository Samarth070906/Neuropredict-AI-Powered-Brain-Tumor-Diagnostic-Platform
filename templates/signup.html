<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neuropredict - Sign Up</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0D9488',    // Teal 600
                        secondary: '#0F172A',  // Slate 900
                        surface: '#F8FAFC',    // Slate 50
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        heading: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/c1df782baf.js" crossorigin="anonymous"></script>
</head>
<body class="font-sans antialiased bg-surface text-slate-800 min-h-screen flex items-center justify-center p-4 py-12 relative overflow-hidden">

    <!-- Abstract background elements -->
    <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-teal-400 rounded-full mix-blend-multiply filter blur-3xl opacity-20"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[500px] h-[500px] bg-blue-300 rounded-full mix-blend-multiply filter blur-3xl opacity-20"></div>

    <div class="w-full max-w-xl bg-white/80 backdrop-blur-xl border border-white p-8 md:p-12 rounded-3xl shadow-2xl relative z-10">
        
        <div class="text-center mb-10">
            <a href="/" class="inline-flex items-center gap-2 mb-6 justify-center">
                <div class="bg-primary/10 p-2 rounded-xl text-primary">
                    <i class="fa-solid fa-brain text-xl"></i>
                </div>
                <span class="font-heading font-bold text-2xl text-secondary tracking-tight">Neuro<span class="text-primary">predict</span></span>
            </a>
            <h1 class="font-heading text-3xl font-bold text-secondary mb-2">Create an Account</h1>
            <p class="text-slate-500">Join our platform to access advanced diagnostic tools.</p>
        </div>

        <!-- Flask Flash Messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
                <div class="mb-6 p-4 rounded-xl text-sm font-medium {% if category == 'success' %}bg-teal-50 text-teal-700 border border-teal-200{% else %}bg-green-50 text-green-700 border border-green-200{% endif %}">
                {{ message }}
                </div>
            {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="/signup" method="POST" class="space-y-5">
            <div>
                <label for="username" class="block text-sm font-medium text-slate-700 mb-1">Username</label>
                <input type="text" id="username" name="username" required 
                    class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-primary focus:border-primary transition-colors hover:bg-white outline-none" 
                    placeholder="Enter username">
            </div>

            <div>
                <label for="email" class="block text-sm font-medium text-slate-700 mb-1">Email Address</label>
                <input type="email" id="email" name="email" required 
                    class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-primary focus:border-primary transition-colors hover:bg-white outline-none" 
                    placeholder="doctor@hospital.com">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div>
                    <label for="password" class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                    <input type="password" id="password" name="password" required 
                        class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-primary focus:border-primary transition-colors hover:bg-white outline-none" 
                        placeholder="••••••••">
                </div>

                <div>
                    <label for="confirm-password" class="block text-sm font-medium text-slate-700 mb-1">Confirm Password</label>
                    <input type="password" id="confirm-password" name="confirm-password" required 
                        class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-primary focus:border-primary transition-colors hover:bg-white outline-none" 
                        placeholder="••••••••">
                </div>
            </div>

            <div class="pt-4">
                <button type="submit" 
                    class="w-full bg-secondary hover:bg-slate-800 text-white font-semibold py-3.5 px-4 rounded-xl transition-all shadow-lg hover:shadow-xl hover:-translate-y-0.5 flex justify-center items-center gap-2">
                    Complete Registration <i class="fa-solid fa-arrow-right text-sm"></i>
                </button>
            </div>
        </form>

        <div class="mt-8 text-center">
            <p class="text-sm text-slate-600">
                Already have an account? 
                <a href="/signin" class="font-semibold text-primary hover:text-teal-700 transition-colors">Log in</a>
            </p>
        </div>

    </div>
</body>
</html>
